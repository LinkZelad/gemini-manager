<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Manager 设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1>Gemini Manager</h1>
      <p class="intro">选择 Obsidian 中用于保存 Gemini 对话的目录。授权后，扩展会把 Markdown 和图片写入同一个目录。</p>

      <div class="field">
        <label for="obsidian-folder">文件夹路径</label>
        <input type="text" id="obsidian-folder" placeholder="AI对话/Gemini">
      </div>

      <div class="actions">
        <button class="btn primary" id="btn-select-dir">选择 Obsidian 目录</button>
        <button class="btn" id="btn-save-folder">保存路径</button>
      </div>

      <div class="status" id="status">正在加载...</div>
    </section>
  </main>

  <script src="options.js" type="module"></script>
</body>
</html>
