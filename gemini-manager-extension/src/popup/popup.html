<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Manager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <img src="../icons/icon48.png" alt="Gemini Manager" class="logo-img">
        <h1>Gemini Manager</h1>
      </div>
      <div class="status" id="status-badge" data-i18n="status.waiting">等待中</div>
    </header>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="current" data-i18n="tab.current">当前对话</button>
      <button class="tab-btn" data-tab="list" data-i18n="tab.list">对话列表</button>
      <button class="tab-btn" data-tab="settings" data-i18n="tab.settings">设置</button>
    </nav>

    <!-- Current Conversation Tab -->
    <section class="tab-panel active" id="tab-current">
      <div class="panel-content">
        <div class="conversation-info" id="current-info">
          <div class="info-row">
            <span class="label" data-i18n="current.title">标题:</span>
            <span class="value" id="conv-title">-</span>
          </div>
          <div class="info-row">
            <span class="label" data-i18n="current.turns">轮次:</span>
            <span class="value" id="conv-turns">-</span>
          </div>
        </div>

        <div class="filename-box">
          <label class="filename-label" data-i18n="current.filename">文件名</label>
          <input type="text" class="filename-input" id="filename-input" data-i18n-placeholder="current.filename_placeholder" placeholder="对话标题.md">
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="btn-export-md">
            <span class="icon">📝</span> <span data-i18n="current.export_md">导出 Markdown</span>
          </button>
          <button class="btn btn-obsidian" id="btn-export-obsidian">
            <span class="icon">🏔️</span> <span data-i18n="current.export_obsidian">导出到 Obsidian</span>
          </button>
          <button class="btn btn-secondary" id="btn-export-json">
            <span class="icon">📊</span> <span data-i18n="current.export_json">导出 JSON</span>
          </button>

          <div class="selective-export-row">
            <button class="btn btn-sm btn-selective" id="btn-toggle-selective">
              <span class="icon">☑️</span> <span data-i18n="current.selective_export">选择性导出</span>
            </button>
          </div>

          <!-- Turn Selector Panel (hidden by default) -->
          <div class="turn-selector-panel" id="turn-selector-panel" hidden>
            <div class="turn-selector-header">
              <span class="turn-selector-title" data-i18n="selective.title">选择要导出的轮次</span>
              <div class="turn-selector-actions">
                <button class="btn btn-xs" id="btn-select-all" data-i18n="selective.select_all">全选</button>
                <button class="btn btn-xs" id="btn-select-none" data-i18n="selective.select_none">全不选</button>
              </div>
            </div>
            <div class="turn-selector-list" id="turn-selector-list">
              <div class="empty-state" data-i18n="selective.loading">加载中...</div>
            </div>
            <div class="turn-selector-footer">
              <span class="turn-count" id="turn-select-count">已选 0 轮</span>
              <div class="turn-selector-export-btns">
                <button class="btn btn-sm btn-primary" id="btn-selective-export-md" data-i18n="selective.export_md">导出选中(MD)</button>
                <button class="btn btn-sm btn-obsidian" id="btn-selective-export-obsidian" data-i18n="selective.export_obsidian">导出选中(OB)</button>
              </div>
            </div>
          </div>

          <button class="btn btn-archive" id="btn-archive-current">
            <span class="icon">📦</span> <span data-i18n="current.archive">归档当前对话</span>
          </button>
        </div>

        <div class="export-feedback">
          <div class="export-status" id="export-status" hidden></div>
          <progress class="export-progress" id="export-progress" value="0" max="100" hidden></progress>
        </div>
      </div>
    </section>

    <!-- Conversation List Tab -->
    <section class="tab-panel" id="tab-list">
      <div class="panel-content">
        <div class="toolbar">
          <button class="btn btn-sm btn-refresh" id="btn-refresh-list">
            <span class="icon">🔄</span> <span data-i18n="list.refresh">刷新</span>
          </button>
          <button class="btn btn-sm btn-secondary" id="btn-export-all">
            <span class="icon">💾</span> <span data-i18n="list.export_all">导出全部</span>
          </button>
        </div>

        <div class="filter-bar">
          <input type="text" class="filter-input" id="filter-input" data-i18n-placeholder="list.search_placeholder" placeholder="搜索对话...">
          <select class="filter-select" id="filter-status">
            <option value="all" data-i18n="list.filter_all">全部</option>
            <option value="active" data-i18n="list.filter_active">未归档</option>
            <option value="archived" data-i18n="list.filter_archived">已归档</option>
          </select>
        </div>

        <div class="conversation-list" id="conversation-list">
          <div class="empty-state" data-i18n="list.loading">正在加载对话列表...</div>
        </div>
      </div>
    </section>

    <!-- Settings Tab -->
    <section class="tab-panel" id="tab-settings">
      <div class="panel-content">
        <div class="setting-group">
          <h3 data-i18n="settings.language">语言 / Language</h3>
          <div class="setting-item">
            <select id="language-select" style="width: 100%; padding: 6px 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 13px;">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </div>
        </div>

        <div class="setting-group">
          <h3 data-i18n="settings.obsidian">Obsidian 设置</h3>
          <div class="setting-item">
            <label for="obsidian-vault" data-i18n="settings.vault_name">Vault 名称</label>
            <input type="text" id="obsidian-vault" data-i18n-placeholder="settings.vault_placeholder" placeholder="我的知识库">
          </div>
          <div class="setting-item">
            <label for="obsidian-vault-path" data-i18n="settings.download_subdir">下载子目录 (可同步到 Vault)</label>
            <input type="text" id="obsidian-vault-path" data-i18n-placeholder="settings.download_subdir_placeholder" placeholder="GeminiExports">
          </div>
          <div class="setting-item">
            <label for="obsidian-folder" data-i18n="settings.folder_path">文件夹路径</label>
            <input type="text" id="obsidian-folder" data-i18n-placeholder="settings.folder_placeholder" placeholder="AI对话/Gemini">
          </div>
          <div class="setting-item">
            <label data-i18n="settings.direct_write">直接写入 Obsidian 目录</label>
            <div class="directory-row">
              <button class="btn btn-sm btn-secondary" id="btn-select-export-dir" data-i18n="settings.open_dir_settings">
                打开目录设置
              </button>
              <span class="directory-status" id="export-dir-status">未选择目录</span>
            </div>
          </div>
          <div class="setting-item">
            <label class="checkbox-label">
              <input type="checkbox" id="use-direct-obsidian-write">
              <span data-i18n="settings.prefer_direct_write">优先写入已选择目录</span>
            </label>
          </div>
          <div class="setting-item">
            <label class="checkbox-label">
              <input type="checkbox" id="obsidian-use-uri">
              <span data-i18n="settings.use_obsidian_uri">使用 Obsidian URI 直接打开 (需安装 Obsidian)</span>
            </label>
          </div>
          <div class="setting-item">
            <label class="checkbox-label">
              <input type="checkbox" id="obsidian-auto-filename">
              <span data-i18n="settings.auto_filename">自动生成文件名 (日期+标题)</span>
            </label>
          </div>
        </div>

        <div class="setting-group">
          <h3 data-i18n="settings.experimental">实验性功能</h3>
          <div class="setting-item">
            <label class="checkbox-label" data-i18n-title="settings.enable_folders_tip" title="开启后会在 Gemini 左侧边栏注入文件夹分类界面。由于高度依赖网页 DOM 结构，可能会失效或导致页面卡顿。">
              <input type="checkbox" id="enable-folder-management">
              <span data-i18n="settings.enable_folders">开启侧栏文件夹分类 (Gemini 专用)</span>
            </label>
          </div>
        </div>

        <div class="setting-group">
          <h3 data-i18n="settings.export">导出设置</h3>
          <div class="setting-item">
            <label for="export-format" data-i18n="settings.default_format">默认导出格式</label>
            <select id="export-format">
              <option value="markdown">Markdown</option>
              <option value="obsidian">Obsidian 格式</option>
              <option value="json">JSON</option>
            </select>
          </div>
          <div class="setting-item">
            <label class="checkbox-label">
              <input type="checkbox" id="include-thoughts">
              <span data-i18n="settings.include_thoughts">包含思考过程 (thoughts)</span>
            </label>
          </div>
        </div>

        <div class="setting-group">
          <h3 data-i18n="settings.data">数据管理</h3>
          <div class="setting-actions">
            <button class="btn btn-sm btn-danger" id="btn-clear-archived" data-i18n="settings.clear_archived">
              清空归档数据
            </button>
            <button class="btn btn-sm btn-secondary" id="btn-export-storage" data-i18n="settings.export_storage">
              导出所有数据
            </button>
          </div>
        </div>

        <div class="setting-group">
          <button class="btn btn-primary" id="btn-save-settings" data-i18n="settings.save">保存设置</button>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <span data-i18n="footer.version">Gemini Manager v1.0</span>
    </footer>
  </div>

  <script src="../i18n/i18n.js"></script>
  <script src="popup.js" type="module"></script>
</body>
</html>
